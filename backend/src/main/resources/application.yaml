server:
  port: 8080
spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}
  config:
    import: optional:file:.env[.properties]
mybatis:
  configuration:
    map-underscore-to-camel-case: true
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000      # 30분 (ms)
  refresh-expiration: 604800000   # 7일 (ms)